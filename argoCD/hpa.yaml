apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rielu-gen-hpa
  namespace: rielu-gen
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rielu-gen
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 50
